          fi
          npx cap sync ios

      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
        NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          # Move API routes out of app directory for static export
          if [ -d "app/api" ]; then
            mv app/api ./api-backup
          fi
          npm run build
          # Move them back after build
          if [ -d "api-backup" ]; then
            mv api-backup app/api
          fi
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com
