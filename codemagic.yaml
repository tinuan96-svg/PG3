workflows:
  ios-workflow:
    name: iOS Workflow (Physical Device)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: |
          # Ensure the plugin has a Package.swift if Capacitor 6 expects one
          if [ -d "node_modules/@capacitor-community/apple-sign-in" ] && [ ! -f "node_modules/@capacitor-community/apple-sign-in/Package.swift" ]; then
            echo "Adding missing Package.swift to @capacitor-community/apple-sign-in"
            cat <<EOF > node_modules/@capacitor-community/apple-sign-in/Package.swift
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "CapacitorCommunityAppleSignIn",
                      targets: ["AppleSignInPlugin"])
              ],
              dependencies: [
                  .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")
              ],
              targets: [
                  .target(
                      name: "AppleSignInPlugin",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm")
                      ],
                      path: "ios/Plugin")
              ]
          )
          EOF
            # Remove leading whitespace from the generated Package.swift
            sed -i '' 's/^[[:space:]]\{10\}//' node_modules/@capacitor-community/apple-sign-in/Package.swift
          fi
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd ios/App
          # List available schemes for debugging
          xcodebuild -list -project App.xcodeproj
          
          # Force resolution of SPM packages
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme "$XCODE_SCHEME"
          
          # Build IPA using xcode-project with a more explicit path
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  ios-simulator-workflow:
    name: iOS Simulator Build (No Signing Required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: |
          # Ensure the plugin has a Package.swift if Capacitor 6 expects one
          if [ -d "node_modules/@capacitor-community/apple-sign-in" ] && [ ! -f "node_modules/@capacitor-community/apple-sign-in/Package.swift" ]; then
            echo "Adding missing Package.swift to @capacitor-community/apple-sign-in"
            cat <<EOF > node_modules/@capacitor-community/apple-sign-in/Package.swift
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "CapacitorCommunityAppleSignIn",
                      targets: ["AppleSignInPlugin"])
              ],
              dependencies: [
                  .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")
              ],
              targets: [
                  .target(
                      name: "AppleSignInPlugin",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm")
                      ],
                      path: "ios/Plugin")
              ]
          )
          EOF
            # Remove leading whitespace from the generated Package.swift
            sed -i '' 's/^[[:space:]]\{10\}//' node_modules/@capacitor-community/apple-sign-in/Package.swift
          fi
          npx cap sync ios

      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com
