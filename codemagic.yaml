workflows:
  ios-workflow:
    name: iOS Workflow (Physical Device)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          # Use the specific bundle ID and type to find the profile
          xcode-project use-profiles --bundle-id "$BUNDLE_ID" --type app-store
      - name: Build iOS IPA
        script: |
          # Detect workspace if it exists, otherwise use project
          XCODE_PATH="$XCODE_PROJECT"
          if [ -d "ios/App/App.xcworkspace" ]; then
            XCODE_PATH="ios/App/App.xcworkspace"
          fi

          if [ -z "$CM_EXPORT_OPTIONS_PLIST" ]; then
            echo "Error: Provisioning profile not found for $BUNDLE_ID. Check Codemagic 'Code signing identities'."
            exit 1
          fi

          xcode-project build-ipa \
            --workspace "$XCODE_PATH" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$CM_EXPORT_OPTIONS_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  ios-simulator-workflow:
    name: iOS Simulator Build (No Signing Required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com
