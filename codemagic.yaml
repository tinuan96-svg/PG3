workflows:
  ios-workflow:
    name: iOS Workflow (Physical Device)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-key"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          # Move API routes out of app directory for static export
          if [ -d "app/api" ]; then
            mv app/api ./api-backup
          fi
          npm run build
          # Move them back after build (optional for CI, but good practice)
          if [ -d "api-backup" ]; then
            mv api-backup app/api
          fi
      - name: Capacitor Sync
        script: |
          # Fix backslashes in the main Package.swift if generated on Windows
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            echo "Fixing backslashes in ios/App/CapApp-SPM/Package.swift"
            sed -i '' 's/\\/\//g' ios/App/CapApp-SPM/Package.swift
          fi

          # Ensure the plugin has a Package.swift if Capacitor 6 expects one
          if [ -d "node_modules/@capacitor-community/apple-sign-in" ] && [ ! -f "node_modules/@capacitor-community/apple-sign-in/Package.swift" ]; then
            echo "Adding missing Package.swift to @capacitor-community/apple-sign-in"
            cat <<EOF > node_modules/@capacitor-community/apple-sign-in/Package.swift
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [
                  .library(
                      name: "CapacitorCommunityAppleSignIn",
                      targets: ["AppleSignInPlugin"])
              ],
              dependencies: [
                  .package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")
              ],
              targets: [
                  .target(
                      name: "AppleSignInPlugin",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm"),
                          "AppleSignInPluginSwift"
                      ],
                      path: "ios/Plugin",
                      exclude: ["Plugin.swift"],
                      publicHeadersPath: "."
                  ),
                  .target(
                      name: "AppleSignInPluginSwift",
                      dependencies: [
                          .product(name: "Capacitor", package: "capacitor-swift-pm"),
                          .product(name: "Cordova", package: "capacitor-swift-pm")
                      ],
                      path: "ios/Plugin",
                      exclude: ["Plugin.m", "Plugin.h", "Info.plist"]
                  )
              ]
          )
          EOF
            # Remove leading whitespace from the generated Package.swift
            sed -i '' 's/^[[:space:]]\{10\}//' node_modules/@capacitor-community/apple-sign-in/Package.swift
          fi
          npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          cd ios/App
          # List available schemes for debugging
          xcodebuild -list -project App.xcodeproj
          
          # Force resolution of SPM packages
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme "$XCODE_SCHEME"
          
          # Build IPA using xcode-project with a more explicit path
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

