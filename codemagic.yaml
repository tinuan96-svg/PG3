workflows:
  ios-workflow:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          if [ -d "app/api" ]; then
            mv app/api ./api-backup
          fi
          npm run build
          if [ -d "api-backup" ]; then
            mv api-backup app/api
          fi
      - name: Capacitor Sync
        script: |
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i '' 's/\\/\//g' ios/App/CapApp-SPM/Package.swift
          fi
          if [ -d "node_modules/@capacitor-community/apple-sign-in" ] && [ ! -f "node_modules/@capacitor-community/apple-sign-in/Package.swift" ]; then
            cat <<EOF > node_modules/@capacitor-community/apple-sign-in/Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [.library(name: "CapacitorCommunityAppleSignIn", targets: ["AppleSignInPlugin"])],
              dependencies: [.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")],
              targets: [
                  .target(name: "AppleSignInPlugin", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm"), "AppleSignInPluginSwift"], path: "ios/Plugin", exclude: ["Plugin.swift"], publicHeadersPath: "."),
                  .target(name: "AppleSignInPluginSwift", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm")], path: "ios/Plugin", exclude: ["Plugin.m", "Plugin.h", "Info.plist"])
              ]
          )
          EOF
            sed -i '' 's/^[[:space:]]\{10\}//' node_modules/@capacitor-community/apple-sign-in/Package.swift
          fi
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --configuration Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  ios-simulator-workflow:
    name: iOS Simulator Build
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          if [ -d "app/api" ]; then
            mv app/api ./api-backup
          fi
          npm run build
          if [ -d "api-backup" ]; then
            mv api-backup app/api
          fi
      - name: Capacitor Sync
        script: |
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i '' 's/\\/\//g' ios/App/CapApp-SPM/Package.swift
          fi
          if [ -d "node_modules/@capacitor-community/apple-sign-in" ] && [ ! -f "node_modules/@capacitor-community/apple-sign-in/Package.swift" ]; then
            cat <<EOF > node_modules/@capacitor-community/apple-sign-in/Package.swift
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [.library(name: "CapacitorCommunityAppleSignIn", targets: ["AppleSignInPlugin"])],
              dependencies: [.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")],
              targets: [
                  .target(name: "AppleSignInPlugin", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm"), "AppleSignInPluginSwift"], path: "ios/Plugin", exclude: ["Plugin.swift"], publicHeadersPath: "."),
                  .target(name: "AppleSignInPluginSwift", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm")], path: "ios/Plugin", exclude: ["Plugin.m", "Plugin.h", "Info.plist"])
              ]
          )
          EOF
            sed -i '' 's/^[[:space:]]\{10\}//' node_modules/@capacitor-community/apple-sign-in/Package.swift
          fi
          npx cap sync ios
      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          if [ -d "app/api" ]; then
            mv app/api ./api-backup
          fi
          npm run build
          if [ -d "api-backup" ]; then
            mv api-backup app/api
          fi
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
