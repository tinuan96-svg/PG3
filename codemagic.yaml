workflows:
  ios-workflow:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: |
          # Clean SPM paths and inject manifest
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i '' 's/\\/\//g' ios/App/CapApp-SPM/Package.swift
          fi
          
          PLUGIN_DIR="node_modules/@capacitor-community/apple-sign-in"
          if [ -d "$PLUGIN_DIR" ]; then
            cat <<EOF > "$PLUGIN_DIR/Package.swift"
          import PackageDescription
          let package = Package(
              name: "CapacitorCommunityAppleSignIn",
              platforms: [.iOS(.v15)],
              products: [.library(name: "CapacitorCommunityAppleSignIn", targets: ["AppleSignInPlugin"])],
              dependencies: [.package(url: "https://github.com/ionic-team/capacitor-swift-pm.git", from: "6.0.0")],
              targets: [
                  .target(name: "AppleSignInPlugin", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm"), "AppleSignInPluginSwift"], path: "ios/Plugin", exclude: ["Plugin.swift"], publicHeadersPath: "."),
                  .target(name: "AppleSignInPluginSwift", dependencies: [.product(name: "Capacitor", package: "capacitor-swift-pm"), .product(name: "Cordova", package: "capacitor-swift-pm")], path: "ios/Plugin", exclude: ["Plugin.m", "Plugin.h", "Info.plist"])
              ]
          )
          EOF
          fi
          npx cap sync ios
      - name: Set up code signing
        script: |
          # Fetch the profile and make it available to xcodebuild
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          # Manually archive using the fetched profile to force capability injection
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/App.xcarchive \
            -configuration Release \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -authenticationKeyPath "$APP_STORE_CONNECT_PRIVATE_KEY_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="PDZ7779Q9J" \
            PROVISIONING_PROFILE_SPECIFIER="PocketGrocery App Store June 26"

          # Export the IPA using the export options generated by Codemagic
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist "$CM_EXPORT_OPTIONS_PLIST"
    artifacts:
      - ios/App/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  ios-simulator-workflow:
    name: iOS Simulator Build (No Signing Required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com
