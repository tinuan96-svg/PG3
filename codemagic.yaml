workflows:
  ios-workflow:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: |
          # Ensure SPM separators are correct for Mac
          if [ -f "ios/App/CapApp-SPM/Package.swift" ]; then
            sed -i '' 's/\\/\//g' ios/App/CapApp-SPM/Package.swift
          fi
          npx cap sync ios
      - name: Set up code signing
        script: |
          # Simplified command without unrecognized flags
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  ios-simulator-workflow:
    name: iOS Simulator Build (No Signing Required)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync ios
      - name: Build for Simulator
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play_credentials
      vars:
        PACKAGE_NAME: "com.pocketgrocery.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Next.js app
        script: |
          mkdir -p out
          touch out/index.html
      - name: Capacitor Sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - tinuan96@gmail.com
